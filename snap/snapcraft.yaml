name: scenedeck
title: SceneDeck
summary: Role-aware OBS scene and audio controller
description: |
  SceneDeck is a native Linux controller for OBS Studio, built for streamers
  who run OBS on one machine while working, coding, presenting, or gaming on
  another. Instead of jumping back to the streaming computer just to change a
  scene, start recording, or adjust audio, SceneDeck gives you a clean remote
  control surface for your OBS setup.

  It also helps when your OBS scene list has grown beyond a few simple scenes.
  Many real setups include utility scenes, camera-only scenes, overlays,
  source wrappers, and other secondary scenes that are useful inside primary
  scenes but should not be clicked live by accident. SceneDeck lets you mark
  scenes by role, then keeps the Live view focused on the primary scenes you
  actually want to switch between.

  Use SceneDeck to switch live scenes, control stream and recording outputs,
  inspect scene dependencies, and manage an integrated audio mixer without
  breaking focus from your main workstation.

base: core24
adopt-info: scenedeck
grade: stable
confinement: strict
compression: lzo
license: MIT
icon: usr/share/icons/hicolor/scalable/apps/io.scenedeck.app.svg
source-code:
  - https://github.com/worxbend/scenedeck
issues:
  - https://github.com/worxbend/scenedeck/issues
website:
  - https://github.com/worxbend/scenedeck

platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

apps:
  scenedeck:
    command: bin/scenedeck
    extensions: [gnome]
    desktop: usr/share/applications/io.scenedeck.app.desktop
    common-id: io.scenedeck.app
    plugs:
      - network

parts:
  scenedeck:
    plugin: rust
    source: .
    build-snaps: [rustup]
    rust-channel: stable
    build-packages:
      - rustup
      - libadwaita-1-dev
      - libdbus-1-dev
      - libglib2.0-bin
      - libglib2.0-dev
      - libgtk-4-dev
      - pkg-config
    stage-packages:
      - libdbus-1-3
    override-pull: |
      craftctl default
      version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
      if [ -z "${version}" ]; then
        echo "failed to read package version from Cargo.toml" >&2
        exit 1
      fi
      craftctl set version="${version}"
    override-build: |
      craftctl default
      install -Dm644 data/io.scenedeck.app.desktop \
        "${CRAFT_PART_INSTALL}/usr/share/applications/io.scenedeck.app.desktop"
      install -Dm644 data/io.scenedeck.app.metainfo.xml \
        "${CRAFT_PART_INSTALL}/usr/share/metainfo/io.scenedeck.app.metainfo.xml"
      install -Dm644 data/io.scenedeck.app.gschema.xml \
        "${CRAFT_PART_INSTALL}/usr/share/glib-2.0/schemas/io.scenedeck.app.gschema.xml"
      install -Dm644 assets/io.scenedeck.app.svg \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/scalable/apps/io.scenedeck.app.svg"
      glib-compile-schemas "${CRAFT_PART_INSTALL}/usr/share/glib-2.0/schemas"
