name: scenedeck
title: SceneDeck
summary: Role-aware OBS scene and audio controller
description: |
  🎬 **Stream from one machine. Control it from another.**

  You run _OBS Studio_ on your streaming rig, but you actually work, code,
  present, or game on a different computer. Every scene switch means
  alt-tabbing back — or getting up and walking over. 😤

  **SceneDeck fixes that.** It's a fast, native Linux remote for your whole OBS
  session, so you can switch scenes, roll recordings, and ride your audio
  without ever breaking focus on your main machine. ✨

  🗂️ **Scene list grown out of control?**

  Real setups fill up with utility scenes, camera-only scenes, overlays, and
  source wrappers — stuff that belongs _inside_ other scenes but should never
  be clicked live by accident. One wrong click on stream and... 😬

  SceneDeck lets you tag scenes by **role** and keeps the Live view showing
  only the primary scenes you actually switch between. No renaming, no
  restructuring — your OBS setup stays exactly as it is. 👍

  🎚️ **Fighting with audio in the middle of a stream?**

  SceneDeck gives you a proper mixer for your global audio and the inputs of
  the active scene — even inputs nested inside other scenes and groups. 🔊

  * Mute or unmute any input instantly.
  * Ride levels with compact vertical sliders.
  * 🔒 Lock a slider so you never nudge it by accident on air.

  📡 **Flying blind on stream health?**

  A status bar sits at the bottom of every page with the numbers that matter:
  connection state, stream and record status, FPS, streaming bitrate, OBS CPU
  usage, and dropped frames — so you spot trouble _before_ your viewers do. 👀

  🧭 **Everything else you'd expect:**

  * ▶️ Switch program scenes from clean, role-aware Live cards.
  * 🔴 Start and stop streaming and recording with clear feedback.
  * 🔀 Switch OBS profiles and scene collections right from the header.
  * 🕸️ Inspect nested scene dependencies in the _Graph_ view.
  * 🩺 Run _Doctor_ checks over your roles and dependency structure.
  * 💾 Export and import your local scene registry as YAML.

  🎨 **Made to feel at home on Linux:**

  * Built with Rust, GTK4, and libadwaita for a truly native experience.
  * Follows your system light/dark theme — or force either mode.
  * Ships polished built-in themes and can load your own custom CSS.
  * 🔐 Keeps your OBS password in the system keyring, never in plain text.

  ✅ **What you'll need:**

  * A Linux desktop with GTK4 and libadwaita.
  * OBS Studio 28+ with the built-in WebSocket server enabled.
  * SceneDeck connects to `127.0.0.1:4455` right out of the box.

  💜 Free and open source — source, issues, and docs live at
  https://github.com/worxbend/scenedeck

base: core24
adopt-info: scenedeck
grade: stable
confinement: strict
compression: lzo
license: MIT
icon: usr/share/icons/hicolor/scalable/apps/io.scenedeck.app.svg
source-code:
  - https://github.com/worxbend/scenedeck
issues:
  - https://github.com/worxbend/scenedeck/issues
website:
  - https://github.com/worxbend/scenedeck

platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

apps:
  scenedeck:
    command: bin/scenedeck
    extensions: [gnome]
    desktop: usr/share/applications/io.scenedeck.app.desktop
    common-id: io.scenedeck.app
    plugs:
      - network

parts:
  rust-deps:
    plugin: nil
    build-snaps: [rustup]
    build-packages:
      - curl
    override-pull: |
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile default --default-toolchain stable
      . "$HOME/.cargo/env"
      ln -sf "$HOME/.cargo/bin/cargo" /usr/local/bin/cargo
      ln -sf "$HOME/.cargo/bin/rustc" /usr/local/bin/rustc
      ln -sf "$HOME/.cargo/bin/rustup" /usr/local/bin/rustup

  scenedeck:
    plugin: rust
    source: .
    rust-channel: none
    after:
      - rust-deps
    build-packages:
      - build-essential
      - libadwaita-1-dev
      - libdbus-1-dev
      - libglib2.0-bin
      - libglib2.0-dev
      - libgtk-4-dev
      - pkg-config
    stage-packages:
      - libdbus-1-3
    override-pull: |
      craftctl default
      version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
      if [ -z "${version}" ]; then
        echo "failed to read package version from Cargo.toml" >&2
        exit 1
      fi
      craftctl set version="${version}"
    override-build: |
      craftctl default
      install -Dm644 data/io.scenedeck.app.desktop \
        "${CRAFT_PART_INSTALL}/usr/share/applications/io.scenedeck.app.desktop"
      install -Dm644 data/io.scenedeck.app.metainfo.xml \
        "${CRAFT_PART_INSTALL}/usr/share/metainfo/io.scenedeck.app.metainfo.xml"
      install -Dm644 data/io.scenedeck.app.gschema.xml \
        "${CRAFT_PART_INSTALL}/usr/share/glib-2.0/schemas/io.scenedeck.app.gschema.xml"
      install -Dm644 assets/io.scenedeck.app.svg \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/scalable/apps/io.scenedeck.app.svg"
      glib-compile-schemas "${CRAFT_PART_INSTALL}/usr/share/glib-2.0/schemas"
